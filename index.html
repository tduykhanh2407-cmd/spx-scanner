<script>

let codes = new Set();

function preprocessImage(file){

return new Promise((resolve)=>{

const img = new Image();

img.onload = ()=>{

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

const cropY = Math.floor(img.height * 0.20);
const cropHeight = Math.floor(img.height * 0.30);

const cropCanvas = document.createElement("canvas");
const cropCtx = cropCanvas.getContext("2d");

cropCanvas.width = img.width;
cropCanvas.height = cropHeight;

cropCtx.drawImage(
canvas,
0,
cropY,
img.width,
cropHeight,
0,
0,
img.width,
cropHeight
);

const imageData =
cropCtx.getImageData(
0,
0,
cropCanvas.width,
cropCanvas.height
);

const data = imageData.data;

for(let i=0;i<data.length;i+=4){

const avg =
(data[i] +
data[i+1] +
data[i+2]) / 3;

const value =
avg > 180 ? 255 : 0;

data[i] = value;
data[i+1] = value;
data[i+2] = value;

}

cropCtx.putImageData(
imageData,
0,
0
);

resolve(cropCanvas);

};

img.src = URL.createObjectURL(file);

});

}

async function scanImages(){

codes.clear();

document.getElementById("result").value = "";
document.getElementById("count").innerText = "Tìm thấy: 0 mã";

const files =
document.getElementById("images").files;

if(files.length===0){

alert("Vui lòng chọn ảnh");

return;

}

for(let i=0;i<files.length;i++){

document.getElementById("status").innerText =
`Đang quét ${i+1}/${files.length}`;

try{

const processed =
await preprocessImage(files[i]);

const result =
await Tesseract.recognize(
processed,
'eng'
);

let text =
result.data.text
.toUpperCase()
.replace(/\s+/g,'')
.replace(/-/g,'')
.replace(/O/g,'0')
.replace(/Q/g,'0')
.replace(/D/g,'0')
.replace(/I/g,'1')
.replace(/L/g,'1')
.replace(/Z/g,'2')
.replace(/S/g,'5')
.replace(/B/g,'8');

text = text.replace(/5PXVN/g,'SPXVN');

const matches =
text.match(/SPXVN[0-9]+/g);

if(matches){

matches.forEach(code=>{

let digits =
code.substring(5);

if(digits.length >= 12){

codes.add(
'SPXVN' +
digits.substring(0,12)
);

}

});

}

}catch(error){

console.log(error);

}

document.getElementById("count").innerText =
`Tìm thấy: ${codes.size} mã`;

}

document.getElementById("result").value =
Array.from(codes)
.sort()
.join('\n');

document.getElementById("status").innerText =
`Hoàn tất - ${codes.size} mã`;

}

function copyAll(){

const text =
document.getElementById("result").value;

if(!text){

alert("Chưa có mã");

return;

}

navigator.clipboard.writeText(text);

alert(`Đã copy ${codes.size} mã`);

}

function clearAll(){

codes.clear();

document.getElementById("images").value = "";
document.getElementById("result").value = "";
document.getElementById("status").innerText = "";
document.getElementById("count").innerText = "Tìm thấy: 0 mã";

alert("Đã xóa toàn bộ dữ liệu");

}

</script>
