<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Scanner</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:20px;
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
}

input,
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}

textarea{
    width:100%;
    height:350px;
    margin-top:10px;
    font-size:14px;
    box-sizing:border-box;
}

#status{
    margin-top:10px;
    font-weight:bold;
}

#count{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>SPX Scanner</h2>

<input type="file" id="images" multiple accept="image/*">

<button onclick="scanImages()">
Quét mã SPXVN
</button>

<button onclick="copyAll()">
Copy toàn bộ
</button>

<button onclick="clearAll()">
Xóa dữ liệu
</button>

<div id="status"></div>

<div id="count">
Tìm thấy: 0 mã
</div>

<textarea id="result" readonly></textarea>

<script>

let codes = new Set();

async function preprocessImage(file){

    return new Promise((resolve)=>{

        const img = new Image();

        img.onload = ()=>{

            const cropY = Math.floor(img.height * 0.18);
            const cropHeight = Math.floor(img.height * 0.28);

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width * 2;
            canvas.height = cropHeight * 2;

            ctx.drawImage(
                img,
                0,
                cropY,
                img.width,
                cropHeight,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const imageData =
                ctx.getImageData(
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

            const data = imageData.data;

            for(let i=0;i<data.length;i+=4){

                const gray =
                    (data[i] +
                    data[i+1] +
                    data[i+2]) / 3;

                const value =
                    gray > 190 ? 255 : 0;

                data[i] = value;
                data[i+1] = value;
                data[i+2] = value;

            }

            ctx.putImageData(imageData,0,0);

            resolve(canvas);

        };

        img.src = URL.createObjectURL(file);

    });

}

async function scanImages(){

    codes.clear();

    document.getElementById("result").value = "";

    document.getElementById("count").innerText =
        "Tìm thấy: 0 mã";

    const files =
        document.getElementById("images").files;

    if(files.length === 0){

        alert("Vui lòng chọn ảnh");

        return;

    }

    for(let i=0;i<files.length;i++){

        document.getElementById("status").innerText =
            `Đang quét ${i+1}/${files.length}`;

        try{

            const processed =
                await preprocessImage(files[i]);

            const result =
                await Tesseract.recognize(
                    processed,
                    'eng'
                );

            let text =
                result.data.text
                .toUpperCase()
                .replace(/\s+/g,'')
                .replace(/-/g,'')
                .replace(/O/g,'0')
                .replace(/Q/g,'0')
                .replace(/D/g,'0')
                .replace(/I/g,'1')
                .replace(/L/g,'1')
                .replace(/Z/g,'2')
                .replace(/S/g,'5')
                .replace(/B/g,'8');

            text = text.replace(/5PXVN/g,'SPXVN');
            text = text.replace(/SPXVNN/g,'SPXVN');

            const matches =
                text.match(/SPXVN[0-9]+/g);

            if(matches){

                matches.forEach(code=>{

                    const digits =
                        code.substring(5);

                    if(digits.length >= 12){

                        const finalCode =
                            "SPXVN" +
                            digits.substring(0,12);

                        if(/^SPXVN\d{12}$/.test(finalCode)){

                            codes.add(finalCode);

                        }

                    }

                });

            }

        }catch(error){

            console.log(error);

        }

        document.getElementById("count").innerText =
            `Tìm thấy: ${codes.size} mã`;

    }

    document.getElementById("result").value =
        Array.from(codes)
        .sort()
        .join('\n');

    document.getElementById("status").innerText =
        `Hoàn tất - ${codes.size} mã`;

}

function copyAll(){

    const text =
        document.getElementById("result").value;

    if(!text){

        alert("Chưa có mã");

        return;

    }

    navigator.clipboard.writeText(text);

    alert(`Đã copy ${codes.size} mã`);

}

function clearAll(){

    codes.clear();

    document.getElementById("images").value = "";

    document.getElementById("result").value = "";

    document.getElementById("status").innerText = "";

    document.getElementById("count").innerText =
        "Tìm thấy: 0 mã";

    alert("Đã xóa toàn bộ dữ liệu");

}

</script>

</body>
</html>
