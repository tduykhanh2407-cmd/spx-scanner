<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Scanner</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:20px;
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
}

input,button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    box-sizing:border-box;
    /* Khôi phục thiết kế giao diện bo góc nhẹ giống như ảnh mẫu của bạn */
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    background-color: #e5e5e5;
    color: #000;
    border: none;
    cursor: pointer;
}

button:active {
    background-color: #d8d8d8;
}

textarea{
    width:100%;
    height:350px;
    margin-top:10px;
    font-size:14px;
    box-sizing:border-box;
    padding: 10px;
    border: 1px solid #eee;
    border-radius: 8px;
}

#status{
    margin-top:10px;
    font-weight:bold;
}

#count{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>SPX Scanner</h2>

<input type="file" id="images" multiple accept="image/*">

<button onclick="scanImages()">
Quét mã SPXVN
</button>

<button onclick="copyAll()">
Copy toàn bộ
</button>

<button onclick="clearAll()">
Xóa dữ liệu
</button>

<div id="status"></div>

<div id="count">Tìm thấy: 0 mã</div>

<textarea id="result" readonly></textarea>

<script>
let codes = new Set();

// Hàm xử lý ảnh nhị phân tăng độ nét chữ
async function preprocessImage(file){
    return new Promise((resolve)=>{
        const img = new Image();
        img.onload = ()=>{
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width * 2;
            canvas.height = img.height * 2;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                const color = brightness > 140 ? 255 : 0; 
                data[i] = data[i+1] = data[i+2] = color;
            }
            ctx.putImageData(imgData, 0, 0);
            resolve(canvas);
        };
        img.src = URL.createObjectURL(file);
    });
}

async function scanImages(){
    codes.clear();
    document.getElementById("result").value = "";
    document.getElementById("count").innerText = "Tìm thấy: 0 mã";

    const files = document.getElementById("images").files;
    if(files.length === 0){
        alert("Vui lòng chọn ảnh");
        return;
    }

    document.getElementById("status").innerText = "Đang khởi tạo bộ quét...";

    // Tạo Worker bên ngoài vòng lặp giúp tăng tốc độ xử lý hàng loạt ảnh
    const worker = await Tesseract.createWorker('eng');
    await worker.setParameters({
        tesseract_char_whitelist: '0123456789SPXVNspxvnABCabc', 
    });

    for(let i = 0; i < files.length; i++){
        document.getElementById("status").innerText = `Đang quét ${i+1}/${files.length}`;

        try{
            const processed = await preprocessImage(files[i]);
            const result = await worker.recognize(processed);

            let text = result.data.text.toUpperCase().replace(/\s+/g,'').replace(/-/g,'');

            // Bộ quy đổi sửa nhanh các ký tự nhận diện lỗi phổ biến
            text = text
                .replace(/O/g,'0')
                .replace(/Q/g,'0')
                .replace(/D/g,'0')
                .replace(/I/g,'1')
                .replace(/L/g,'1')
                .replace(/Z/g,'2')
                .replace(/G/g,'6')
                .replace(/T/g,'7')
                .replace(/S/g,'5');

            // Khôi phục lại tiền tố chính xác
            text = text.replace(/5PXVN/g,'SPXVN');

            // Gom trọn cụm chữ kèm dãy ký tự liên tục phía sau để bóc tách thông minh
            const matches = text.match(/SPXVN[0-9ABC]+/g);

            if(matches){
                matches.forEach(rawCode => {
                    let digits = rawCode.substring(5);

                    // ĐẶC TRỊ SỬA LỖI TRÙNG SỐ 0: Nếu dải ký tự dư độ dài và bị lặp "00..." ở đầu
                    if (digits.length > 12 && digits.startsWith("00")) {
                        digits = digits.substring(1); // Cắt bỏ bớt một chữ số 0 bị đọc thừa
                    }

                    // Tiến hành cắt lấy chuẩn 12 ký tự sau khi xử lý lỗi trùng số 0
                    if (digits.length >= 12) {
                        let finalDigits = digits.substring(0, 12);
                        
                        // Sửa lỗi nếu số 8 ở giữa chuỗi bị nhận diện nhầm thành chữ B
                        let body = finalDigits.substring(0, 11).replace(/B/g, '8');
                        let tail = finalDigits.substring(11, 12); // Ký tự cuối cùng
                        let checkedCode = "SPXVN" + body + tail;

                        // Chấp nhận cả 2 định dạng: 12 số HOẶC 11 số + chữ A/B/C ở đuôi
                        if (/^SPXVN\d{12}$/.test(checkedCode) || /^SPXVN\d{11}[ABC]$/.test(checkedCode)) {
                            codes.add(checkedCode);
                        }
                    }
                });
            }

        } catch(error){
            console.log(error);
        }

        document.getElementById("count").innerText = `Tìm thấy: ${codes.size} mã`;
    }

    await worker.terminate();

    document.getElementById("result").value = Array.from(codes).sort().join('\n');
    document.getElementById("status").innerText = `Hoàn tất - ${codes.size} mã`;
}

function copyAll(){
    const text = document.getElementById("result").value;
    if(!text){
        alert("Chưa có mã");
        return;
    }
    navigator.clipboard.writeText(text);
    alert(`Đã copy ${codes.size} mã`);
}

function clearAll(){
    codes.clear();
    document.getElementById("images").value = "";
    document.getElementById("result").value = "";
    document.getElementById("status").innerText = "";
    document.getElementById("count").innerText = "Tìm thấy: 0 mã";
    alert("Đã xóa toàn bộ dữ liệu");
}
</script>

</body>
</html>
