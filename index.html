<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Scanner - Fix Double Zero</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 700px;
    margin: auto;
    background-color: #f9f9f9;
}

h2{
    text-align: center;
    color: #333;
}

input, button{
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 16px;
    box-sizing: border-box;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background-color: #007bff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
}

button:hover {
    background-color: #0056b3;
}

button.secondary {
    background-color: #6c757d;
}
button.secondary:hover {
    background-color: #5a6268;
}

button.danger {
    background-color: #dc3545;
}
button.danger:hover {
    background-color: #bd2130;
}

textarea{
    width: 100%;
    height: 350px;
    margin-top: 10px;
    font-size: 16px;
    box-sizing: border-box;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-family: monospace;
}

#status{
    margin-top: 15px;
    font-weight: bold;
    color: #007bff;
    text-align: center;
}

#count{
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    color: #28a745;
}
</style>
</head>

<body>

<h2>SPX Scanner (Sửa lỗi trùng số 0)</h2>

<input type="file" id="images" multiple accept="image/*">

<button onclick="scanImages()">
Quét mã SPXVN
</button>

<button class="secondary" onclick="copyAll()">
Copy toàn bộ
</button>

<button class="danger" onclick="clearAll()">
Xóa dữ liệu
</button>

<div id="status"></div>

<div id="count">Tìm thấy: 0 mã</div>

<textarea id="result" readonly placeholder="Kết quả mã SPXVN sẽ hiển thị ở đây..."></textarea>

<script>
let codes = new Set();

// Hàm xử lý ảnh nhị phân
async function preprocessImage(file){
    return new Promise((resolve)=>{
        const img = new Image();
        img.onload = ()=>{
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width * 2;
            canvas.height = img.height * 2;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                const color = brightness > 140 ? 255 : 0; 
                data[i] = data[i+1] = data[i+2] = color;
            }
            ctx.putImageData(imgData, 0, 0);
            resolve(canvas);
        };
        img.src = URL.createObjectURL(file);
    });
}

async function scanImages(){
    codes.clear();
    document.getElementById("result").value = "";
    document.getElementById("count").innerText = "Tìm thấy: 0 mã";

    const files = document.getElementById("images").files;
    if(files.length === 0){
        alert("Vui lòng chọn ảnh");
        return;
    }

    document.getElementById("status").innerText = "Đang khởi tạo bộ quét...";

    const worker = await Tesseract.createWorker('eng');
    await worker.setParameters({
        tesseract_char_whitelist: '0123456789SPXVNspxvnABCabc', 
    });

    for(let i = 0; i < files.length; i++){
        document.getElementById("status").innerText = `Đang quét ảnh ${i+1}/${files.length}`;

        try{
            const processed = await preprocessImage(files[i]);
            const result = await worker.recognize(processed);

            let text = result.data.text.toUpperCase().replace(/\s+/g,'').replace(/-/g,'');

            // Bộ quy đổi sửa lỗi ký tự tương đồng toàn diện
            text = text
                .replace(/O/g,'0')
                .replace(/Q/g,'0')
                .replace(/D/g,'0')
                .replace(/I/g,'1')
                .replace(/L/g,'1')
                .replace(/Z/g,'2')
                .replace(/G/g,'6')
                .replace(/T/g,'7')
                .replace(/S/g,'5');

            // Sửa lại tiền tố nếu vô tình bị đổi chữ S sang số 5
            text = text.replace(/5PXVN/g,'SPXVN');

            // TÌM KIẾM THÔNG MINH: Quét cụm SPXVN + toàn bộ ký tự số/chữ nối liền (không giới hạn độ dài ở đây)
            const matches = text.match(/SPXVN[0-9ABC]+/g);

            if(matches){
                matches.forEach(rawCode => {
                    let digits = rawCode.substring(5); // Cắt lấy phần lõi phía sau chữ SPXVN

                    // ĐẶC TRỊ LỖI TRÙNG SỐ 0: Nếu phần đuôi dài hơn quy định và bắt đầu bằng "00"
                    // (Tất cả mã SPX thực tế luôn bắt đầu bằng một số 0 đơn lẻ như 06..., không có mã nào bắt đầu bằng 00...)
                    if (digits.length > 12 && digits.startsWith("00")) {
                        digits = digits.substring(1); // Xóa bớt một số 0 bị thừa ở đầu đi
                    }

                    // Tiến hành cắt lấy chuẩn độ dài 12 ký tự sau khi đã sửa lỗi thừa số 0
                    if (digits.length >= 12) {
                        let finalDigits = digits.substring(0, 12);
                        
                        // Sửa lỗi nếu Tesseract nhận diện nhầm số 8 ở giữa chuỗi thành chữ B
                        let body = finalDigits.substring(0, 11).replace(/B/g, '8');
                        let tail = finalDigits.substring(11, 12); // Ký tự cuối cùng (có thể là số hoặc A/B/C)
                        let checkedCode = "SPXVN" + body + tail;

                        // Kiểm tra định dạng chuẩn cuối cùng: 12 số HOẶC 11 số + A/B/C
                        if (/^SPXVN\d{12}$/.test(checkedCode) || /^SPXVN\d{11}[ABC]$/.test(checkedCode)) {
                            codes.add(checkedCode);
                        }
                    }
                });
            }

        } catch(error){
            console.error("Lỗi ảnh số " + (i+1) + ":", error);
        }

        document.getElementById("count").innerText = `Tìm thấy: ${codes.size} mã`;
    }

    await worker.terminate();

    document.getElementById("result").value = Array.from(codes).sort().join('\n');
    document.getElementById("status").innerText = `Hoàn tất - Đã quét xong ${files.length} ảnh`;
}

function copyAll(){
    const text = document.getElementById("result").value;
    if(!text){
        alert("Chưa có dữ liệu");
        return;
    }
    navigator.clipboard.writeText(text);
    alert(`Đã copy thành công ${codes.size} mã!`);
}

function clearAll(){
    codes.clear();
    document.getElementById("images").value = "";
    document.getElementById("result").value = "";
    document.getElementById("status").innerText = "";
    document.getElementById("count").innerText = "Tìm thấy: 0 mã";
    alert("Đã xóa sạch dữ liệu.");
}
</script>

</body>
</html>
