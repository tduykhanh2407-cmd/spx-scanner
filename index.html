<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPX Scanner</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
}

input,
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    cursor:pointer;
}

textarea{
    width:100%;
    height:350px;
    margin-top:10px;
    font-size:14px;
    box-sizing:border-box;
}

#status{
    margin-top:10px;
    font-weight:bold;
}

#count{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>SPX Scanner</h2>

<input
    type="file"
    id="images"
    multiple
    accept="image/*">

<button onclick="scanImages()">
    Quét mã SPXVN
</button>

<button onclick="copyAll()">
    Copy toàn bộ
</button>

<div id="status"></div>

<div id="count">
    Tìm thấy: 0 mã
</div>

<textarea
    id="result"
    readonly></textarea>

<script>

let codes = new Set();

async function scanImages(){

    codes.clear();

    const files =
        document.getElementById("images").files;

    if(files.length === 0){

        alert("Vui lòng chọn ảnh");

        return;
    }

    document.getElementById("result").value = "";

    document.getElementById("count").innerText =
        "Tìm thấy: 0 mã";

    for(let i=0;i<files.length;i++){

        document.getElementById("status").innerText =
            `Đang quét ${i+1}/${files.length}`;

        try{

            const result =
                await Tesseract.recognize(
                    files[i],
                    'eng'
                );

            let text =
                result.data.text
                    .toUpperCase()
                    .replace(/\s+/g,'')
                    .replace(/-/g,'')
                    .replace(/O/g,'0')
                    .replace(/I/g,'1')
                    .replace(/L/g,'1');

            const matches =
                text.match(/SPXVN\d{12}/g);

            if(matches){

                matches.forEach(code => {

                    if(code.length === 17){

                        codes.add(code);

                    }

                });

            }

        }catch(error){

            console.log(error);

        }

        document.getElementById("count").innerText =
            `Tìm thấy: ${codes.size} mã`;
    }

    const resultList =
        Array.from(codes).sort();

    document.getElementById("result").value =
        resultList.join('\n');

    document.getElementById("status").innerText =
        `Hoàn tất - ${codes.size} mã`;

}

function copyAll(){

    const text =
        document.getElementById("result").value;

    if(!text){

        alert("Chưa có mã");

        return;
    }

    navigator.clipboard.writeText(text);

    alert(`Đã copy ${codes.size} mã`);

}

</script>

</body>
</html>
