<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPX Scanner</title>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
max-width:700px;
margin:auto;
}

button,
input{
width:100%;
padding:15px;
margin-top:10px;
font-size:16px;
}

textarea{
width:100%;
height:300px;
margin-top:10px;
font-size:14px;
}

#status{
margin-top:10px;
font-weight:bold;
}

#count{
margin-top:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>SPX Scanner</h2>

<input
type="file"
id="images"
multiple
accept="image/*">

<button onclick="scanImages()">
Quét mã SPXVN
</button>

<button onclick="copyAll()">
Copy toàn bộ
</button>

<div id="status"></div>

<div id="count">
Tìm thấy: 0 mã
</div>

<textarea
id="result"
readonly></textarea>

<script>

let codes = new Set();

async function scanImages(){

codes.clear();

const files =
document.getElementById("images").files;

if(files.length===0){

alert("Vui lòng chọn ảnh");

return;
}

document.getElementById("result").value="";

for(let i=0;i<files.length;i++){

document.getElementById("status").innerText=
`Đang quét ${i+1}/${files.length}`;

try{

const result=
await Tesseract.recognize(
files[i],
'eng'
);

let text=
result.data.text
.toUpperCase()
.replace(/\s/g,'')
.replace(/-/g,'')
.replace(/O/g,'0');

const matches=
text.match(/SPXVN\d{10,15}/g);

if(matches){

matches.forEach(code=>{

codes.add(code);

});
}

}catch(e){

console.log(e);
}

document.getElementById("count").innerText=
`Tìm thấy: ${codes.size} mã`;

}

document.getElementById("result").value=
Array.from(codes).join('\n');

document.getElementById("status").innerText=
"Hoàn tất";
}

function copyAll(){

const text=
document.getElementById("result").value;

if(!text){

alert("Chưa có mã");

return;
}

navigator.clipboard.writeText(text);

alert("Đã copy toàn bộ mã");
}

</script>

</body>
</html>
